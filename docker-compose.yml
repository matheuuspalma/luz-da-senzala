services:
  postgres:
    image: postgres:16-alpine
    container_name: luzdasenzala-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luzdasenzala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luzdasenzala}
      POSTGRES_DB: ${POSTGRES_DB:-luzdasenzala}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luzdasenzala}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: luzdasenzala-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@luzdasenzala.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5433:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
