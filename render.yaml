services:
  - type: web
    name: luz-da-senzala-api
    runtime: node
    repo: https://github.com/matheuuspalma/luz-da-senzala
    rootDir: backend
    buildCommand: pnpm install && npx prisma generate && npx nest build
    startCommand: node dist/main
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
